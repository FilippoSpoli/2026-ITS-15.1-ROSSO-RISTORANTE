<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin - Gestione Menù</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="hold-transition sidebar-mini">
    <div class="wrapper">
        <nav class="main-header navbar navbar-expand navbar-dark">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" data-widget="pushmenu" href="#" role="button"><i
                            class="fas fa-bars"></i></a></li>
            </ul>
        </nav>

        <aside class="main-sidebar sidebar-dark-primary elevation-4">
            <a href="dashboard.html" class="brand-link text-center">
                <span class="brand-text font-weight-light text-oro-accento">Steakhouse <strong>Admin</strong></span>
            </a>

            <div class="sidebar"></div>
        </aside>

        <div class="content-wrapper pt-3">
            <div class="content-header">
                <div class="container-fluid row mb-2">
                    <div class="col-sm-6">
                        <h1 class="m-0 font-weight-bold text-white">Gestione Piatti</h1>
                    </div>
                    <div class="col-sm-6 text-right">
                        <button class="btn bg-oro-accento font-weight-bold" onclick="apriModalNuovo()"><i
                                class="fas fa-plus mr-1"></i> Nuovo Piatto</button>
                    </div>
                </div>
            </div>

            <section class="content">
                <div class="container-fluid">
                    <div class="card bg-dark border border-secondary">
                        <div class="card-header p-3 border-bottom border-secondary d-flex align-items-center bg-dark">
                            <select id="bulk-action-menu" class="form-control bg-secondary text-white border-0 mr-2"
                                style="max-width: 250px;">
                                <option value="">-- Azioni di gruppo --</option>
                                <option value="soft_delete">Archivia selezionati (Soft Delete)</option>
                                <option value="restore">Ripristina selezionati</option>
                            </select>
                            <button class="btn btn-info font-weight-bold"
                                onclick="eseguiAzioneMassaMenu()">Applica</button>
                        </div>
                        <div class="card-body p-0">
                            <table class="table table-striped table-hover m-0 text-white">
                                <thead>
                                    <tr>
                                        <th style="width: 40px;" class="text-center">
                                            <input type="checkbox" id="seleziona-tutti-menu"
                                                onclick="toggleTuttiMenu(this)">
                                        </th>
                                        <th>Anteprima</th>
                                        <th>Nome Piatto</th>
                                        <th>Categoria</th>
                                        <th>Prezzo</th>
                                        <th class="text-center">Stato</th>
                                        <th class="text-right">Azioni</th>
                                    </tr>
                                </thead>
                                <tbody id="corpo-tabella-menu"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <div class="modal fade" id="modalPiatto" tabindex="-1" role="dialog" aria-hidden="true">
            <div class="modal-dialog" role="document">
                <div class="modal-content bg-dark border border-secondary text-white">
                    <div class="modal-header">
                        <h5 class="modal-title font-weight-bold" id="titoloModal">Piatto</h5><button type="button"
                            class="close text-white" data-dismiss="modal">&times;</button>
                    </div>
                    <form id="formPiatto" onsubmit="salvaPiattoModificato(event)">
                        <input type="hidden" id="piatto-id">
                        <div class="modal-body">
                            <div class="form-group"><label>Nome Piatto *</label><input type="text" id="piatto-nome"
                                    class="form-control bg-secondary text-white border-0" required></div>
                            <div class="form-group">
                                <label>Categoria *</label>
                                <select id="piatto-categoria" class="form-control bg-secondary text-white border-0"
                                    required>
                                    <option value="I Nostri Tagli">I Nostri Tagli</option>
                                    <option value="Vini & Cocktail">Vini & Cocktail</option>
                                    <option value="Contorni">Contorni</option>
                                </select>
                            </div>
                            <div class="form-group"><label>Prezzo (€) *</label><input type="number" id="piatto-prezzo"
                                    step="0.01" class="form-control bg-secondary text-white border-0" required></div>
                            <div class="form-group"><label>URL Immagine</label><input type="text" id="piatto-foto"
                                    class="form-control bg-secondary text-white border-0"></div>
                            <div class="form-group">
                                <div class="custom-control custom-switch"><input type="checkbox"
                                        class="custom-control-input" id="piatto-disponibile" checked><label
                                        class="custom-control-label" for="piatto-disponibile">Disponibile</label></div>
                            </div>
                        </div>
                        <div class="modal-footer"><button type="button" class="btn btn-secondary"
                                data-dismiss="modal">Annulla</button><button type="submit"
                                class="btn btn-success font-weight-bold">Salva</button></div>
                    </form>
                </div>
            </div>
        </div>

        <div class="modal fade" id="modalInfoPiatto" tabindex="-1" role="dialog" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered" role="document">
                <div class="modal-content bg-dark border border-secondary text-white">
                    <div class="modal-header">
                        <h5 class="modal-title font-weight-bold"><i
                                class="fas fa-info-circle mr-2 text-info"></i>Dettagli Piatto</h5>
                        <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                    <div class="modal-body text-center">
                        <img id="info-foto" src="" class="img-fluid rounded mb-3 border"
                            style="max-height: 180px; width: 180px; object-fit: cover; border-color: #2d3748 !important;">

                        <table class="table table-sm table-borderless text-left mt-2 text-white">
                            <tr>
                                <td class="font-weight-bold text-muted" style="width: 35%;">Nome:</td>
                                <td id="info-nome" class="font-weight-bold text-white"></td>
                            </tr>
                            <tr>
                                <td class="font-weight-bold text-muted">Categoria:</td>
                                <td id="info-categoria" class="text-white"></td>
                            </tr>
                            <tr>
                                <td class="font-weight-bold text-muted">Prezzo:</td>
                                <td id="info-prezzo" class="text-success font-weight-bold"></td>
                            </tr>
                            <tr>
                                <td class="font-weight-bold text-muted">Stato:</td>
                                <td id="info-stato"></td>
                            </tr>
                        </table>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary btn-sm" data-dismiss="modal">Chiudi</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/main.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/sidebar.js"></script>
</body>

</html>
