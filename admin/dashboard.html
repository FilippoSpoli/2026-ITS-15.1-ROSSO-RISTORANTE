<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin - Dashboard KPI</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="hold-transition sidebar-mini">
    <div class="wrapper">
        <nav class="main-header navbar navbar-expand navbar-dark">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
                </li>
                <li class="nav-item d-none d-sm-inline-block">
                    <a href="../index.html" class="nav-link" target="_blank"><i
                            class="fas fa-external-link-alt mr-1"></i> Vedi Sito Pubblico</a>
                </li>
            </ul>
        </nav>

        <aside class="main-sidebar sidebar-dark-primary elevation-4">
            <a href="dashboard.html" class="brand-link text-center">
                <span class="brand-text font-weight-light text-oro-accento">Steakhouse <strong>Admin</strong></span>
            </a>

            <div class="sidebar"></div>
        </aside>

        <div class="content-wrapper">
            <div class="content-header">
                <div class="container-fluid">
                    <div class="row mb-2">
                        <div class="col-sm-6">
                            <h1 class="m-0">Dashboard KPI</h1>
                        </div>
                    </div>
                </div>
            </div>

            <section class="content">
                <div class="container-fluid">

                    <h5 class="mb-2 mt-4 text-muted">Gestione Attività e Clienti</h5>
                    <div class="row">
                        <div class="col-lg-3 col-6">
                            <div class="small-box bg-info elevation-2">
                                <div class="inner">
                                    <h3 id="kpi-ordini">0</h3>
                                    <p>Totale Ordini</p>
                                </div>
                                <div class="icon"><i class="fas fa-shopping-cart"></i></div>
                            </div>
                        </div>
                        <div class="col-lg-3 col-6">
                            <div class="small-box bg-success elevation-2">
                                <div class="inner">
                                    <h3 id="kpi-incassi">€ 0.00</h3>
                                    <p>Totale Incassi</p>
                                </div>
                                <div class="icon"><i class="fas fa-dollar-sign"></i></div>
                            </div>
                        </div>
                        <div class="col-lg-3 col-6">
                            <div class="small-box bg-warning elevation-2">
                                <div class="inner">
                                    <h3 id="kpi-piatti" class="text-white">0</h3>
                                    <p class="text-white">Piatti nel Menu</p>
                                </div>
                                <div class="icon"><i class="fas fa-hamburger"></i></div>
                            </div>
                        </div>
                        <div class="col-lg-3 col-6">
                            <div class="small-box bg-danger elevation-2">
                                <div class="inner">
                                    <h3 id="kpi-prenotazioni">0</h3>
                                    <p>Prenotazioni Attive</p>
                                </div>
                                <div class="icon"><i class="fas fa-calendar-check"></i></div>
                            </div>
                        </div>
                    </div>

                    <h5 class="mb-2 mt-4 text-muted">Gestione Personale e Risorse Umane</h5>
                    <div class="row">
                        <div class="col-lg-4 col-6">
                            <div class="small-box bg-teal elevation-2">
                                <div class="inner">
                                    <h3 id="kpi-ferie">0</h3>
                                    <p>Richieste Ferie in Attesa</p>
                                </div>
                                <div class="icon"><i class="fas fa-plane"></i></div>
                            </div>
                        </div>
                        <div class="col-lg-4 col-6">
                            <div class="small-box bg-purple elevation-2">
                                <div class="inner">
                                    <h3 id="kpi-malattie">0</h3>
                                    <p>Malattie Correnti</p>
                                </div>
                                <div class="icon"><i class="fas fa-heartbeat"></i></div>
                            </div>
                        </div>
                        <div class="col-lg-4 col-12">
                            <div class="small-box bg-olive elevation-2">
                                <div class="inner">
                                    <h3 id="kpi-cedolini">0</h3>
                                    <p>Cedolini Mese Corrente</p>
                                </div>
                                <div class="icon"><i class="fas fa-file-invoice-dollar"></i></div>
                            </div>
                        </div>
                    </div>

                </div>
            </section>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>

    <script src="js/main.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/sidebar.js"></script>
</body>

</html>
