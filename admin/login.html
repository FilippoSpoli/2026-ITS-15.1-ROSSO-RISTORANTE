<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login Admin</title>

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="hold-transition login-page">
    <div class="login-card">
        <div class="card card-outline card-primary">
            <div class="card-header text-center">
                <a href="../index.html" class="h1 text-oro-accento">Steakhouse</a>
            </div>
            <div class="card-body">
                <p class="login-box-msg">Accedi per gestire il sito</p>

                <form id="loginForm">
                    <div class="input-group mb-3">
                        <input type="text" id="username" class="form-control" placeholder="Username" required>
                        <div class="input-group-append">
                            <div class="input-group-text"><span class="fas fa-user"></span></div>
                        </div>
                    </div>
                    <div class="input-group mb-3">
                        <input type="password" id="password" class="form-control" placeholder="Password" required>
                        <div class="input-group-append">
                            <div class="input-group-text"><span class="fas fa-lock"></span></div>
                        </div>
                    </div>
                    <div class="row justify-content-center">
                        <div class="col-8 col-sm-6">
                            <button type="submit" class="btn bg-oro-accento btn-block text-sfondo-scuro">Accedi</button>
                        </div>
                    </div>
                </form>

                <p class="login-footer">Credenziali demo: <strong>admin / admin123</strong></p>
                <p id="errorMsg" class="text-danger mt-2" style="display:none; text-align:center;">Username o password
                    errati.</p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            var u = document.getElementById('username').value.trim();
            var p = document.getElementById('password').value;
            if (u === 'admin' && p === 'admin123') {
                window.location.href = 'dashboard.html';
            } else {
                var err = document.getElementById('errorMsg');
                err.style.display = 'block';
            }
        });
    </script>
</body>

</html>
