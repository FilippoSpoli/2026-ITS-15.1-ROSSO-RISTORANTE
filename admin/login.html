<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login Admin</title>

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="../css/style.css">

    <style>
        :root {
            --main-color: #C5A059;
            --main-hover: #e6bf70;
            --bg-dark: #0a0a0a;
            --card-bg: #141414;
        }

        body {
            background: linear-gradient(180deg, #080808 0%, #121212 100%);
            color: #f7f7f7;
            font-family: 'Lato', sans-serif;
        }

        .login-card {
            max-width: 420px;
            margin: 8% auto;
            padding: 1rem;
        }

        .card {
            background: rgba(20, 20, 20, 0.94);
            border: 1px solid rgba(197, 160, 89, 0.18);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        }

        .card-header {
            background: transparent;
            border-bottom: none;
            padding-bottom: 0;
        }

        .card-header .h1 {
            color: var(--main-color);
            letter-spacing: 0.08em;
            font-family: 'Playfair Display', serif;
        }

        .card-body {
            background: transparent;
        }

        .login-box-msg {
            color: #bfbfbf;
            margin-bottom: 1.5rem;
        }

        .form-control {
            background: #121212;
            border: 1px solid #2b2b2b;
            color: #e8e8e8;
        }

        .form-control:focus {
            outline: none;
            box-shadow: 0 0 0 0.2rem rgba(197, 160, 89, 0.2);
            border-color: var(--main-color);
        }

        .input-group-text {
            background: #141414;
            color: var(--main-color);
            border: 1px solid #2b2b2b;
        }

        .btn.bg-oro-accento {
            background: var(--main-color) !important;
            border-color: var(--main-color) !important;
            color: #050505 !important;
        }

        .btn.bg-oro-accento:hover {
            background: var(--main-hover) !important;
            border-color: var(--main-hover) !important;
        }

        .help-text,
        .text-danger,
        .text-gray-500 {
            color: #d1d1d1;
        }

        .login-footer {
            margin-top: 1rem;
            text-align: center;
            color: #8f8f8f;
        }

        .login-footer a {
            color: var(--main-color);
            text-decoration: none;
        }

        .card-outline.card-primary .card-header {
            border-color: transparent;
        }

        .card.card-outline.card-primary {
            border-top: none !important;
            border-color: rgba(197, 160, 89, 0.18) !important;
        }

        .login-page {
            background-image: linear-gradient(180deg, #090909 0%, #121212 100%);
        }
    </style>
</head>

<body class="hold-transition login-page">
    <div class="login-card">
        <div class="card card-outline card-primary">
            <div class="card-header text-center">
                <a href="../index.html" class="h1 text-oro-accento">Steakhouse</a>
            </div>
            <div class="card-body">
                <p class="login-box-msg">Accedi per gestire il sito</p>

                <form id="loginForm">
                    <div class="input-group mb-3">
                        <input type="text" id="username" class="form-control" placeholder="Username" required>
                        <div class="input-group-append">
                            <div class="input-group-text"><span class="fas fa-user"></span></div>
                        </div>
                    </div>
                    <div class="input-group mb-3">
                        <input type="password" id="password" class="form-control" placeholder="Password" required>
                        <div class="input-group-append">
                            <div class="input-group-text"><span class="fas fa-lock"></span></div>
                        </div>
                    </div>
                    <div class="row justify-content-center">
                        <div class="col-8 col-sm-6">
                            <button type="submit" class="btn bg-oro-accento btn-block text-sfondo-scuro">Accedi</button>
                        </div>
                    </div>
                </form>

                <p class="login-footer">Credenziali demo: <strong>admin / admin123</strong></p>
                <p id="errorMsg" class="text-danger mt-2" style="display:none; text-align:center;">Username o password
                    errati.</p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            var u = document.getElementById('username').value.trim();
            var p = document.getElementById('password').value;
            if (u === 'admin' && p === 'admin123') {
                window.location.href = 'admin.html';
            } else {
                var err = document.getElementById('errorMsg');
                err.style.display = 'block';
            }
        });
    </script>
</body>

</html>
