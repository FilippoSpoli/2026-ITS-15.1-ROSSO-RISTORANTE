<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestione Menù Ristorante</title>

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link class="jsbin" href="http://ajax.googleapis.com/ajax/libs/jqueryui/1/themes/base/jquery-ui.css"
        rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="hold-transition sidebar-mini">
    <div class="wrapper">

        <nav class="main-header navbar navbar-expand navbar-dark">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
                </li>
            </ul>
            <ul class="navbar-nav ml-auto">
                <li class="nav-item">
                    <a class="btn btn-outline-secondary" href="../index.html">
                        <i class="fas fa-sign-out-alt mr-1"></i> Esci
                    </a>
                </li>
            </ul>
        </nav>

        <aside class="main-sidebar sidebar-dark-primary elevation-4">
            <a href="dashboard.html" class="brand-link text-center">
                <span class="brand-text font-weight-light text-oro-accento">Steakhouse <strong>Admin</strong></span>
            </a>
            <div class="sidebar">
                <nav class="mt-3">
                    <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu"
                        data-accordion="false">
                        <li class="nav-item">
                            <a href="dashboard.html" class="nav-link">
                                <i class="nav-icon fas fa-tachometer-alt"></i>
                                <p>Dashboard</p>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="menu.html" class="nav-link">
                                <i class="nav-icon fas fa-utensils"></i>
                                <p>Gestione Menù</p>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="prenotazioni.html" class="nav-link active">
                                <i class="nav-icon fas fa-calendar-alt"></i>
                                <p>Prenotazioni</p>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </aside>

        <div class="content-wrapper">
            <div class="content-header">
                <div class="container-fluid">
                    <div class="row mb-2">
                        <div class="col-sm-6">
                            <h1 class="m-0 text-white font-weight-bold">Prenotazioni tavoli</h1>
                        </div>
                        <div class="col-sm-6 text-right">
                            <button id="btnSvuota" class="btn btn-danger font-weight-bold">
                                <i class="fas fa-trash-alt mr-1"></i> Svuota Database
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="content">
                <div class="container-fluid">
                    <div class="row">
                        <div class="col-12">
                            <div class="card bg-dark border border-secondary">
                                <div
                                    class="card-header p-3 border-bottom border-secondary d-flex align-items-center bg-dark">
                                    <select id="bulk-action-prenotazioni"
                                        class="form-control bg-secondary text-white border-0 mr-2"
                                        style="max-width: 250px;">
                                        <option value="">-- Azioni di gruppo --</option>
                                        <option value="soft_delete">Archivia selezionate (Soft Delete)</option>
                                        <option value="restore">Ripristina selezionate</option>
                                    </select>
                                    <button class="btn btn-info font-weight-bold"
                                        id="btnApplicaBulkPrenotazioni">Applica</button>
                                </div>
                                <div class="card-body p-0 table-responsive">
                                    <table class="table table-striped table-hover m-0 text-white">
                                        <thead>
                                            <tr>
                                                <th style="width: 40px;" class="text-center">
                                                    <input type="checkbox" id="seleziona-tutti-prenotazioni">
                                                </th>
                                                <th>ID</th>
                                                <th>Nome</th>
                                                <th>Email</th>
                                                <th>Telefono</th>
                                                <th>Persone</th>
                                                <th>Data</th>
                                                <th>Orario</th>
                                                <th>Note</th>
                                                <th>Azioni</th>
                                            </tr>
                                        </thead>
                                        <tbody id="tabellaPrenotazioni"></tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <aside class="control-sidebar control-sidebar-dark"></aside>
        <footer class="main-footer">
            <div class="float-right d-none d-sm-inline">
                Pannello di Amministrazione Ristorante
            </div>
            <strong>Copyright &copy; 2026.</strong> Tutti i diritti riservati.
        </footer>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/main.js"></script>
    <script src="js/prenotazioni.js"></script>
</body>

</html>
