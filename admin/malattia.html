<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin - Richieste Malattia</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="hold-transition sidebar-mini">
    <div class="wrapper">
        <aside class="main-sidebar sidebar-dark-primary elevation-4">
            <a href="dashboard.html" class="brand-link text-center">
                <span class="brand-text font-weight-light text-oro-accento">Steakhouse <strong>Admin</strong></span>
            </a>

            <div class="sidebar"></div>
        </aside>

        <div class="content-wrapper pt-3">
            <div class="content-header">
                <div class="container-fluid row mb-2">
                    <div class="col-sm-6">
                        <h1 class="m-0 font-weight-bold text-white">Registri Malattia</h1>
                    </div>
                </div>
            </div>

            <section class="content">
                <div class="container-fluid">
                    <div class="card bg-dark border border-secondary">
                        <div class="card-body p-0 table-responsive">
                            <table class="table table-striped table-hover m-0 text-white">
                                <thead>
                                    <tr>
                                        <th>Dipendente</th>
                                        <th>Codice Protocollo INPS</th>
                                        <th>Inizio Malattia</th>
                                        <th>Fine Prevista</th>
                                        <th class="text-center">Stato</th>
                                        <th class="text-center">Azioni</th>
                                    </tr>
                                </thead>
                                <tbody id="tabella-malattia"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/main.js"></script>
    <script src="js/malattia.js"></script>
    <script src="js/sidebar.js"></script>
</body>

</html>
